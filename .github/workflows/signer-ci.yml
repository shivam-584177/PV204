name: Signer CI

on:
  push:
    branches: ["main", "shivam/**"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Download dependencies
        run: go mod download

      - name: Build signer node
        run: go build ./cmd/signer/...

      - name: Run unit tests
        run: go test ./internal/...
